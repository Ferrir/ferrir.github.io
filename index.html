<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paulo Alexandre Ferreira | Senior Backend Developer</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="description"
        content="Portfolio profissional de Paulo Alexandre Ferreira, desenvolvedor backend sênior especialista em .NET, C# e Azure.">
    <link rel="stylesheet" href="style.css?v=2.0.0">
</head>

<body>

    <main>
        <section class="hero container">
            <div class="hexagon-wrapper reveal">
                <div class="hexagon">
                    <div class="hexagon-inner">
                        <img id="profile-img" src="" alt="Paulo Ferreira">
                    </div>
                </div>
            </div>
            <div class="hero-content">
                <h1 id="user-name" class="reveal">PAULO <span class="last-name">FERREIRA</span></h1>
                <div id="hero-headline" class="headline reveal" style="font-size: 1.5rem; margin-top: -1rem;">SENIOR
                    BACKEND DEVELOPER</div>
                <div class="profile-section reveal" style="margin-top: 2rem;">
                    <div class="profile-title"
                        style="font-family: var(--font-mono); color: var(--accent); font-size: 0.9rem; letter-spacing: 0.2em; margin-bottom: 0.5rem;">
                        PROFILE</div>
                    <p id="user-summary" style="font-size: 1rem; color: var(--text-muted); line-height: 1.8;"></p>
                </div>
            </div>
        </section>

        <div class="contact-bar">
            <div class="container contact-bar-inner">
                <div class="contact-group">
                    <div class="lang-switcher" style="display: flex; gap: 0.8rem;">
                        <button id="btn-en" class="lang-btn active" title="English">
                            <img src="https://flagcdn.com/w20/gb.png" alt="English">
                        </button>
                        <button id="btn-pt" class="lang-btn" title="Portuguese">
                            <img src="https://flagcdn.com/w20/br.png" alt="Portuguese">
                        </button>
                    </div>
                    <button id="theme-toggle" aria-label="Toggle Theme"
                        style="color: inherit; background: none; border: none; cursor: pointer; margin-left: 1rem;">
                        <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <svg id="theme-icon-light" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="18"
                            height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </div>

                <div class="contact-group">
                    <a href="mailto:ferreira.alexandre@gmail.com" class="contact-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <span>EMAIL</span>
                    </a>
                    <a href="https://www.linkedin.com/in/paulo-alexandre-ferreira/" target="_blank"
                        class="contact-item">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z">
                            </path>
                            <rect x="2" y="9" width="4" height="12"></rect>
                            <circle cx="4" cy="4" r="2"></circle>
                        </svg>
                        <span>LINKEDIN</span>
                    </a>
                    <a href="resume.html" id="resume-link" class="contact-item" style="padding: 0.2rem 0.6rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 6 2 18 2 18 9" />
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
                            <rect x="6" y="14" width="12" height="8" />
                        </svg>
                        <span id="resume-text">CURRÍCULO</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="main-grid container">
            <!-- Left Divider -->
            <div class="column-divider"></div>
            <!-- Left Column: Skills & Info -->
            <aside class="sidebar-column">
                <section id="skills" class="reveal">
                    <h2 id="title-skills" class="column-title">COMPETÊNCIAS</h2>
                    <div id="skills-list" class="skills-stack">
                        <!-- Injected via JS -->
                    </div>
                </section>

                <section id="languages" class="reveal">
                    <h2 id="title-languages" class="column-title">IDIOMAS</h2>
                    <div id="languages-list" class="skills-stack">
                        <!-- Injected via JS -->
                    </div>
                </section>
            </aside>

            <!-- Vertical Divider -->
            <div class="column-divider"></div>

            <!-- Right Column: Experience & Education -->
            <div class="content-column">
                <section id="experience" class="reveal">
                    <h2 id="title-experience" class="column-title">EXPERIÊNCIA</h2>
                    <div id="experience-grid" class="timeline-stack">
                        <!-- Injected via JS -->
                    </div>
                </section>

                <section id="education" class="reveal">
                    <h2 id="title-education" class="column-title">FORMAÇÃO</h2>
                    <div id="education-list" class="timeline-stack">
                        <!-- Injected via JS -->
                    </div>
                </section>
            </div>
        </div>
    </main>


    <footer style="padding: 4rem 0; border-top: 1px solid var(--border-color);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p style="font-family: var(--font-mono); font-size: 0.8rem; opacity: 0.5;">© 2026 PAULO ALEXANDRE
                    FERREIRA</p>
                <p style="font-family: var(--font-mono); font-size: 0.8rem; opacity: 0.5;">BUILT WITH VITE + VANILLA JS
                </p>
            </div>
            <div class="social-links" style="display: flex; gap: 2rem;">
                <a href="mailto:ferreira.alexandre@gmail.com" class="headline"
                    style="font-size: 1rem; margin: 0; display: flex; align-items: center; gap: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                        <polyline points="22,6 12,13 2,6" />
                    </svg>
                    <span class="nav-label">EMAIL</span>
                </a>
                <a href="https://www.linkedin.com/in/paulo-alexandre-ferreira/" target="_blank" class="headline"
                    style="font-size: 1rem; margin: 0; display: flex; align-items: center; gap: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
                        <rect x="2" y="9" width="4" height="12" />
                        <circle cx="4" cy="4" r="2" />
                    </svg>
                    <span class="nav-label">LINKEDIN</span>
                </a>
            </div>



        </div>
    </footer>

    <script type="module" src="main.js"></script>
</body>

</html>
